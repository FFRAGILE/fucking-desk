name: "⚡ Direct RDP — Bore Tunnel (No Card)"

on:
  workflow_dispatch:
    inputs:
      PIN:
        description: "Windows User Password (at least 8 chars recommended)"
        required: true
        default: "MySecurePassword123"

jobs:
  rdp-bore:
    runs-on: windows-latest
    steps:
      - name: "🛡️ 1. Enable Terminal Server (RDP)"
        shell: pwsh
        run: |
          Write-Host "Enabling Remote Desktop Protocol (RDP)..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Set Windows Audio service to Automatic and Start it
          Set-Service -Name "Audiosrv" -StartupType Automatic
          Set-Service -Name "AudioEndpointBuilder" -StartupType Automatic
          Start-Service -Name "Audiosrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue

      - name: "🔑 2. Configure Windows User Password"
        shell: pwsh
        run: |
          $username = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $Password = ConvertTo-SecureString "${{ github.event.inputs.PIN }}" -AsPlainText -Force
          Set-LocalUser -Name $username -Password $Password
          Write-Host "Password updated for user: $username"

      - name: "📥 3. Download & Run Bore TCP Tunnel"
        shell: pwsh
        run: |
          $username = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $logPath = "$env:TEMP\bore.log"
          $errPath = "$env:TEMP\bore_err.log"
          
          if (Test-Path $logPath) { Remove-Item $logPath -Force }
          if (Test-Path $errPath) { Remove-Item $errPath -Force }

          Write-Host "Downloading Bore TCP Tunnel Client..."
          # دانلود نسخه ویندوزی پایدار و رسمی Bore از گیت‌هاب سازنده
          $url = "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
          $zipPath = "$env:TEMP\bore.zip"
          $extractPath = "$env:TEMP\bore"
          
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $borePath = "$extractPath\bore.exe"

          Write-Host "Starting Bore TCP tunnel on port 3389..."
          # اجرای تانل روی پورت ویندوز و هدایت لاگ‌ها به فایل موقت
          $session = Start-Process -FilePath $borePath -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -PassThru -RedirectStandardOutput $logPath -RedirectStandardError $errPath

          Write-Host "Waiting for Bore to allocate a port..."
          $address = $null
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path $logPath) {
                  $content = Get-Content $logPath -Raw
                  # پیدا کردن آدرس تخصیص یافته (مثلاً bore.pub:12345)
                  if ($content -match 'bore\.pub:\d+') {
                      $address = $Matches[0]
                      break
                  }
              }
          }

          if (-not $address) {
              if (Test-Path $errPath) {
                  Write-Host "==============================================="
                  Write-Host "❌ Error Log from Bore Tunnel Client:"
                  Get-Content $errPath
                  Write-Host "==============================================="
              }
              Write-Error "Failed to generate Bore tunnel. Please try running the workflow again!"
              exit 1
          }

          Write-Host "==============================================="
          Write-Host "🎉 RDP Connection Details (Bore):"
          Write-Host "IP / Address : $address"
          Write-Host "Username     : $username"
          Write-Host "Password     : ${{ github.event.inputs.PIN }}"
          Write-Host "==============================================="
          Write-Host "Instructions:"
          Write-Host "1. Open Remote Desktop Connection (mstsc) on your local PC."
          Write-Host "2. Enter the IP/Address shown above (e.g., bore.pub:51234)."
          Write-Host "3. Enter the Username and Password."
          Write-Host "==============================================="

      - name: "🔁 4. Keep Alive Loop"
        shell: pwsh
        run: |
          $timeout = New-TimeSpan -Hours 6
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          while ($stopwatch.Elapsed -lt $timeout) {
              $remaining = $timeout - $stopwatch.Elapsed
              Write-Host "Running... Time elapsed: $($stopwatch.Elapsed.ToString('hh\:mm\:ss')) (Remaining: $($remaining.ToString('hh\:mm\:ss')))"
              Start-Sleep -Seconds 60
          }
