name: "⚡ Direct RDP — Serveo Tunnel (No Card)"

on:
  workflow_dispatch:
    inputs:
      PIN:
        description: "Windows User Password (at least 8 chars recommended)"
        required: true
        default: "MySecurePassword123"

jobs:
  rdp-serveo:
    runs-on: windows-latest
    steps:
      - name: "🛡️ 1. Enable Terminal Server (RDP)"
        shell: pwsh
        run: |
          Write-Host "Enabling Remote Desktop Protocol (RDP)..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Set Windows Audio service to Automatic and Start it
          Set-Service -Name "Audiosrv" -StartupType Automatic
          Set-Service -Name "AudioEndpointBuilder" -StartupType Automatic
          Start-Service -Name "Audiosrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue

      - name: "🔑 2. Configure Windows User & Generate SSH Key"
        shell: pwsh
        run: |
          $username = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $Password = ConvertTo-SecureString "${{ github.event.inputs.PIN }}" -AsPlainText -Force
          Set-LocalUser -Name $username -Password $Password
          Write-Host "Password updated for user: $username"

          # تولید کلید امنیتی موقت برای احراز هویت با سرور Serveo
          Write-Host "Generating dummy SSH key pair for tunneling..."
          $sshDir = "$env:USERPROFILE\.ssh"
          if (-not (Test-Path $sshDir)) { New-Item -ItemType Directory -Path $sshDir -Force | Out-Null }
          ssh-keygen -t rsa -b 2048 -N '""' -f "$sshDir\id_rsa" -q

      - name: "📥 3. Establish Serveo SSH Tunnel"
        shell: pwsh
        run: |
          $username = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name.Split('\')[1]
          $logPath = "$env:TEMP\serveo.log"
          $errPath = "$env:TEMP\serveo_err.log"
          
          if (Test-Path $logPath) { Remove-Item $logPath -Force }
          if (Test-Path $errPath) { Remove-Item $errPath -Force }

          Write-Host "Starting Serveo SSH tunnel on port 3389..."
          # Start SSH tunnel in background and redirect output to logs
          $session = Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -R 0:127.0.0.1:3389 serveo.net" -NoNewWindow -PassThru -RedirectStandardOutput $logPath -RedirectStandardError $errPath

          Write-Host "Waiting for Serveo to allocate a port..."
          $address = $null
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path $logPath) {
                  $content = Get-Content $logPath -Raw
                  # Search for allocated port pattern (e.g. serveo.net:12345)
                  if ($content -match 'serveo\.net:\d+') {
                      $address = $Matches[0]
                      break
                  }
              }
          }

          if (-not $address) {
              if (Test-Path $errPath) {
                  Write-Host "==============================================="
                  Write-Host "❌ Error Log from SSH Client:"
                  Get-Content $errPath
                  Write-Host "==============================================="
              }
              Write-Error "Failed to generate Serveo tunnel. Please try running the workflow again!"
              exit 1
          }

          Write-Host "==============================================="
          Write-Host "🎉 RDP Connection Details (Serveo):"
          Write-Host "IP / Address : $address"
          Write-Host "Username     : $username"
          Write-Host "Password     : ${{ github.event.inputs.PIN }}"
          Write-Host "==============================================="
          Write-Host "Instructions:"
          Write-Host "1. Open Remote Desktop Connection (mstsc) on your local PC."
          Write-Host "2. Enter the IP/Address shown above (e.g., serveo.net:12345)."
          Write-Host "3. Enter the Username and Password."
          Write-Host "==============================================="

      - name: "🔁 4. Keep Alive Loop"
        shell: pwsh
        run: |
          $timeout = New-TimeSpan -Hours 6
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          while ($stopwatch.Elapsed -lt $timeout) {
              $remaining = $timeout - $stopwatch.Elapsed
              Write-Host "Running... Time elapsed: $($stopwatch.Elapsed.ToString('hh\:mm\:ss')) (Remaining: $($remaining.ToString('hh\:mm\:ss')))"
              Start-Sleep -Seconds 60
          }
